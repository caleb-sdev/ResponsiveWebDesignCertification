<!--
Paso 4
El elemento iframe también toma un atributo src con un valor que indica la URL o la ruta del recurso a mostrar.

Agrega un atributo src de https://www.youtube.com/embed/I0_951_MPE0 a tu elemento iframe.

En este punto, deberías ver el video mostrando en la página, pero hay algunos atributos más que necesitas agregar.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Videos in an iframe</title>
  </head>
  <body>
    <h1>iframe Video Display</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/I0_951_MPE0"
    >

    </iframe>
  </body>
</html>
