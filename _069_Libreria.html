<!--
Paso 11
Debajo del elemento h2 en el primer elemento que tenga una clase card, agrega un elemento p con el siguiente texto:

Código de ejemplo
This is an epic story of Sally and her dog Rex as they navigate through other worlds.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XYZ Bookstore Page</title>
</head>

<body>
  <h1>XYZ Bookstore</h1>
  <p>Browse our collection of amazing books!</p>
  
  <div class="card-container">
    <div class="card" id="sally-adventure-book">
      <h2>Sally's SciFi Adventure</h2>
      <p class="card">This is an epic story of Sally and her dog Rex as they navigate through other worlds.</p>
    </div>
  </div>
</body>

</html>
