<!--
Paso 12
Otro tipo MIME común es el tipo MIME video/ogg.

Ogg es un formato contenedor de multimedia digital diseñado para proporcionar una transmisión eficiente y manipulación de multimedia digital. Es mantenido por la Fundación Xiph.Org y es libre y abierto, sin restricciones por patentes de software. Su nombre se deriva de "ogging", jerga del juego de computadora Netrek.

Debajo de tu segundo elemento source, agrega un tercer elemento source y asígnale un atributo src con el valor https://cdn.freecodecamp.org/curriculum/labs/mapmethod.ogg y un atributo type con el valor video/ogg.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Working with the HTML Video Element</title>
</head>
<body>
  <h1>Working with the HTML Video Element</h1>
  <video
    width="640"
    loop
    controls
    muted
    poster="https://cdn.freecodecamp.org/curriculum/labs/past-event2.jpg"
  >
    <source
      src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
      type="video/mp4"
    >
    <source
      src="https://cdn.freecodecamp.org/curriculum/labs/mapmethod.webm"
      type="video/webm"
    >
   <source src="https://cdn.freecodecamp.org/curriculum/labs/mapmethod.ogg" type="video/ogg"> 
  </video>
</body>
</html>
