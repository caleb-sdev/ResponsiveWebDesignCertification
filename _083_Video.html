<!--
Paso 5
El atributo controls proporciona controles de reproducción que incluyen reproducción, retroceso y control de volumen para el elemento video.

El atributo controls es un atributo booleano y no necesita un valor.

Agrega el atributo controls al elemento video.

Ahora deberías ver el elemento video mostrado en la página.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Working with the HTML Video Element</title>
</head>
<body>
  <h1>Working with the HTML Video Element</h1>
  <video width="640" controls>
  </video>
</body>
</html>
