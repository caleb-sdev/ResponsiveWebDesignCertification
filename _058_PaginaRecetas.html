<!--
Crea una página de recetas
Construye una aplicación que sea funcionalmente similar a este es el proyecto de ejemplo. Intenta no copiar el proyecto de ejemplo, dale tu propio estilo personal.

Objetivo: Cumplir con las historias de usuario a continuación y pasar todas las pruebas para completar el laboratorio.

Historias de usuario:

Debes tener una declaración !DOCTYPE html.
Debes tener un elemento html con el atributo lang configurado a en.
Debes tener un elemento head que contenga un elemento title con el nombre de tu receta y un elemento meta con un atributo charset configurado a UTF-8.
Debes tener un elemento body.
Debes tener un elemento h1 con el nombre de tu receta.
Debes tener un elemento p que introduzca la receta debajo del h1.
Debes tener un elemento h2 con el texto Ingredients para la sección de ingredientes.
Debes tener una lista no ordenada (elemento ul) con al menos cuatro elementos de lista (elementos li) que enumeren tus ingredientes bajo el primer elemento h2.
Debes tener un segundo elemento h2 con el texto Instructions para la sección de instrucciones.
Debes tener una lista ordenada (elemento ol) con al menos cuatro elementos de lista que enumeren los pasos de la receta en orden, debajo del segundo h2.
Debes tener un elemento img con un atributo src configurado a una imagen válida, puedes usar https://cdn.freecodecamp.org/curriculum/labs/recipe.jpg si deseas, y un atributo alt que describa la imagen.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Pan con pollo</title>
    <meta charset="UTF-8"></meta>
  </head>
  <body>
    <h1>Pan con pollo</h1>
    <p>receta simple:</p>
    <h2>Ingredients</h2>
    <ul>
      <li>pollo cocido</li>
      <li>mayonesa</li>
      <li>lechuga</li>
      <li>pan de molde</li>
    </ul>
    <h2>Instructions</h2>
    <ol>
      <li>deshilachar el pollo</li>
      <li>combinar con mayonesa</li>
      <li>colocar la lechuga en el pan</li>
      <li>armar el pan con el pollo</li>
    </ol>
    <img src="https://cdn.freecodecamp.org/curriculum/labs/recipe.jpg" alt="huevos blancos">
  </body>
  </html>
