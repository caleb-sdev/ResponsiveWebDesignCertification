<!--
Paso 7
El siguiente atributo que agregarás es referrerpolicy. Es la regla que determina cuánta información compartes cuando tu página se conecta a otra página.

Agrega el atributo referrerpolicy y configúralo en strict-origin-when-cross-origin. Esto comparte la dirección completa en el mismo sitio, solo el nombre del sitio en otros sitios, y nada en sitios inseguros.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Videos in an iframe</title>
  </head>
  <body>
    <h1>iframe Video Display</h1>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/I0_951_MPE0"
      allow="accelerometer autoplay clipboard-write encrypted-media gyroscope web-share"
referrerpolicy="strict-origin-when-cross-origin"
    >

    </iframe>
  </body>
</html>
