<!--
Paso 4
El atributo loop reiniciará el video una vez que la reproducción haya terminado. Piensa en un meme de internet que repite la reproducción. Omitir el atributo loop hará que el video se reproduzca una sola vez.

El atributo loop es un atributo booleano y no necesita un valor.

Agrega el atributo loop al elemento video.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Working with the HTML Video Element</title>
</head>
<body>
  <h1>Working with the HTML Video Element</h1>
  <video width="640" loop="">
  </video>
</body>
</html>
